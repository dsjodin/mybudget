services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mybudget
      POSTGRES_USER: mybudget
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mybudget_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mybudget"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://mybudget:${DB_PASSWORD:-mybudget_dev}@db:5432/mybudget
      FLASK_ENV: ${FLASK_ENV:-production}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
